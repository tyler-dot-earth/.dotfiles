git:
  confirmOnDiscard: true
  paging:
    colorArg: always
    pager: delta --paging=never --features=everforest-dark

os:
  editPreset: "nvim"

keybinding:
  commits:
    openInBrowser: "o"
  files:
    toggleBlame: "b"
  universal:
    editFile: "e"
    editFileAtLine: "E"

gui:
  showFileTree: true
  showBranchCommitHash: true
  showBottomLine: false
  showNumstatInFilesView: true
